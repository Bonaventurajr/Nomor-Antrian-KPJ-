<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Pengambilan Nomor Antrian</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <!-- TOAST -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Sukses!</span>
    </div>

    <!-- APP -->
    <div class="app-wrapper">

        <!-- HEADER -->
        <div class="header">
            <div class="logo-atas">
                <span class="line"></span>
                <div class="logo-wrapper">
                    <img src="spsi.png" alt="Logo KPJ" class="logo-img"/>
                </div>
                <span class="line"></span>
            </div>
            <h1>Pengambilan <span>Nomor Antrian</span></h1>
            <p>(Kartu Pekerja Jakarta PT International Chemical Industry)</p>
        </div>

        <!-- INFO -->
        <div class="info-badge">
            <i class="fas fa-search"></i>
            <span>Ketik di kolom NIP, Nama, atau Bagian untuk mencari</span>
        </div>

        <!-- FORM -->
        <div class="form-card">

            <div class="form-row-2">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> NIP</label>
                    <div class="autocomplete-container">
                        <input 
                            type="text" 
                            id="inputNip" 
                            class="autocomplete-input" 
                            placeholder="Ketik NIP..." 
                            autocomplete="off"
                            oninput="filterAutocomplete('nip', this.value)"
                            onkeydown="handleKeydown('nip', event)"
                        />
                        <div class="autocomplete-list" id="listNip"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama</label>
                    <div class="autocomplete-container">
                        <input 
                            type="text" 
                            id="inputNama" 
                            class="autocomplete-input" 
                            placeholder="Ketik Nama..." 
                            autocomplete="off"
                            oninput="filterAutocomplete('nama', this.value)"
                            onkeydown="handleKeydown('nama', event)"
                        />
                        <div class="autocomplete-list" id="listNama"></div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-building"></i> Bagian</label>
                <div class="autocomplete-container">
                    <input 
                        type="text" 
                        id="inputBagian" 
                        class="autocomplete-input" 
                        placeholder="Ketik Bagian..." 
                        autocomplete="off"
                        oninput="filterAutocomplete('bagian', this.value)"
                        onkeydown="handleKeydown('bagian', event)"
                    />
                    <div class="autocomplete-list" id="listBagian"></div>
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-success" onclick="ambilAntrian()">
                    <i class="fas fa-ticket-alt"></i> Ambil Nomor
                </button>
            </div>

            <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
                <button class="btn btn-outline btn-sm" onclick="tambahPeserta()">
                    <i class="fas fa-plus"></i> Tambah Peserta
                </button>
                <button class="btn btn-outline btn-sm" onclick="clearForm()">
                    <i class="fas fa-eraser"></i> Clear
                </button>
            </div>
        </div>

        <!-- TICKET -->
        <div class="ticket" id="ticket">
            <span class="check"><i class="fas fa-check-circle"></i></span>
            <h3>Nomor Antrian Anda</h3>
            <div class="nomor" id="nomorAntrian">001</div>
            <div class="detail" id="detailAntrian">
                <strong>Nama</strong> · Bagian
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-section">
            <div class="table-header">
                <h4><i class="fas fa-list-ul"></i> Data Antrian</h4>
                <span class="count" id="countAntrian">0 antrian</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>No</th><th>NIP</th><th>Nama</th><th>Bagian</th><th>Antrian</th><th>Aksi</th></tr></thead>
                    <tbody id="tbodyAntrian">
                        <tr><td colspan="6"><div class="empty-state"><i class="fas fa-inbox"></i>Belum ada antrian</div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- BOTTOM -->
        <div class="bottom-actions">
            <button class="btn btn-primary" onclick="saveExcel()"><i class="fas fa-file-excel"></i> Save Excel</button>
            <button class="btn btn-danger" onclick="resetAll()"><i class="fas fa-trash-alt"></i> Reset</button>
        </div>

        <p style="text-align:center; margin-top:14px; font-size:12px; color:#94a3b8;">
            <i class="fas fa-database"></i> Data tersimpan otomatis
        </p>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
